name: Deploy Docs to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'falcon_mcp/**'
      - 'scripts/generate_module_docs.py'
      - 'docs-site/**'
      - 'CHANGELOG.md'
      - '.github/workflows/docs-deploy.yml'
  workflow_dispatch:

# Deny all permissions at the workflow level; each job grants only what it needs.
permissions: {}

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@39eb6c9dde236bbc368681611e63120a6eb4afac # v5

      - name: Install Python dependencies
        run: uv sync --all-extras

      - name: Generate module documentation
        run: uv run python scripts/generate_module_docs.py

      - name: Prepare changelog
        run: |
          {
            printf '%s\n' '---'
            printf '%s\n' 'title: Changelog'
            printf '%s\n' 'description: Release history for the Falcon MCP Server.'
            printf '%s\n' '---'
            printf '\n'
            cat CHANGELOG.md
          } > docs-site/src/content/docs/changelog.md

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 9

      - name: Install docs dependencies
        run: cd docs-site && pnpm install --frozen-lockfile

      - name: Build docs site
        run: cd docs-site && pnpm run build

      - name: Archive pages artifact
        run: |
          tar \
            --dereference --hard-dereference \
            --directory docs-site/dist/ \
            -cvf "$RUNNER_TEMP/artifact.tar" \
            --exclude=.git \
            --exclude=.github \
            .

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: github-pages
          path: ${{ runner.temp }}/artifact.tar
          retention-days: 1
          if-no-files-found: error

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
